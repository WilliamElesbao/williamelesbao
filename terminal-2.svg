<svg width="820" height="320" viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hello    { animation: fadeUp 0.6s ease 0.1s both; }
      .name1    { animation: fadeUp 0.6s ease 0.4s both; }
      .name2    { animation: fadeUp 0.6s ease 0.7s both; }
      .sub      { animation: fadeUp 0.5s ease 1.0s both; }
      .divider  { animation: fadeUp 0.5s ease 1.1s both; }
      .desc1    { animation: fadeUp 0.5s ease 1.3s both; }
      .desc2    { animation: fadeUp 0.5s ease 1.5s both; }
      .logged   { animation: fadeUp 0.5s ease 1.7s both; }
      .path     { animation: fadeUp 0.5s ease 1.9s both; }
      .cursor   { animation: blink 1s step-end infinite; }
      .border   { animation: glow 2.5s ease-in-out infinite; }
      .icon     { animation: fadeUp 0.8s ease 0.5s both; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.35; }
        50%       { opacity: 0.9; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="320" rx="14" fill="#020610"/>

  <!-- Animated border glow -->
  <rect class="border" x="1.5" y="1.5" width="817" height="317" rx="13" fill="none" stroke="#2563EB" stroke-width="1.5"/>

  <!-- Corner brackets — blue accent -->
  <path d="M28 14 L14 14 L14 28" stroke="#3B82F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M792 14 L806 14 L806 28" stroke="#3B82F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M28 306 L14 306 L14 292" stroke="#3B82F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M792 306 L806 306 L806 292" stroke="#3B82F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Welcome -->
  <text class="hello" x="35" y="50" font-family="Courier New, monospace" font-size="14" fill="#34d399" letter-spacing="1">Welcome to my GitHub 👾</text>

  <!-- WILLIAM -->
  <text class="name1" x="35" y="118" font-family="Courier New, monospace" font-size="58" font-weight="bold" fill="#3B82F6" letter-spacing="6">WILLIAM</text>

  <!-- ELESBÃO -->
  <text class="name2" x="35" y="183" font-family="Courier New, monospace" font-size="58" font-weight="bold" fill="#3B82F6" letter-spacing="6">ELESBÃO</text>

  <!-- Subtitle -->
  <text class="sub" x="36" y="208" font-family="Courier New, monospace" font-size="13" fill="#7C93C8" letter-spacing="1">Full-Stack Software Engineer</text>

  <!-- Divider -->
  <line class="divider" x1="35" y1="224" x2="600" y2="224" stroke="#12233D" stroke-width="1"/>

  <!-- Description -->
  <text class="desc1" x="35" y="244" font-family="Courier New, monospace" font-size="13" fill="#dbe7ff"><tspan fill="#34d399" font-weight="bold">console.log('Hello, World!')</tspan> — architecting and shipping</text>
  <text class="desc2" x="35" y="261" font-family="Courier New, monospace" font-size="13" fill="#dbe7ff">production-grade systems — web, mobile &amp; APIs, end to end in TypeScript.</text>

  <!-- Logged in -->
  <circle class="logged" cx="36" cy="280" r="5" fill="#3B82F6"/>
  <text class="logged" x="48" y="284" font-family="Courier New, monospace" font-size="13" fill="#dbe7ff">Logged in as user: <tspan fill="#3B82F6" font-weight="bold">WilliamElesbao</tspan></text>

  <!-- Path + blinking cursor -->
  <text class="path" x="35" y="304" font-family="Courier New, monospace" font-size="13" fill="#dbe7ff">~/WilliamRepo <tspan fill="#2563EB">[∠main]</tspan>  <tspan class="cursor" fill="#3B82F6">█</tspan></text>

  <!-- GitHub icon — blue, right side -->
  <svg x="648" y="48" width="120" height="120" viewBox="0 0 24 24">
    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.298 24 12c0-6.63-5.37-12-12-12z" fill="#3B82F6"/>
  </svg>
</svg>
